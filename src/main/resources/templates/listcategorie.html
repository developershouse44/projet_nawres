        <script>

            const API = "http://localhost:8088/categories";


            // LOAD categories

            function loadCategories(){

                fetch(API + "/getAll")
                    .then(res => res.json())
                    .then(data => {

                        let html = "";

                        data.forEach(c => {

                            html += `

<div class="col-md-4">

<div class="card shadow-sm mb-4">

<div class="card-body">

<h5 class="card-title">
${c.nom}
</h5>

<p class="text-muted">
${c.libelle ?? ""}
</p>


<div class="d-flex gap-1">

<button class="btn btn-warning btn-sm"
onclick="editCategorie(${c.id}, '${c.nom}', '${c.libelle}')">

✏ Modifier

</button>


<button class="btn btn-danger btn-sm"
onclick="deleteCategorie(${c.id})">

🗑 Supprimer

</button>

</div>

</div>

</div>

</div>

`;

                        });


                        document.getElementById("categories").innerHTML = html;


                    });

            }



            loadCategories();





            // CREATE

            function addCategorie(){


                let nom = document.getElementById("nom").value;

                let libelle = document.getElementById("libelle").value;



                fetch(API + "/createcategorie",{

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({

                        nom:nom,

                        libelle:libelle

                    })

                })

                    .then(res=>res.json())

                    .then(()=>{

                        alert("Catégorie ajoutée");

                        loadCategories();

                    });


            }







            // UPDATE

            function editCategorie(id,nom,libelle){


                let newNom = prompt("Nouveau nom :",nom);

                let newLibelle = prompt("Nouveau libelle :",libelle);



                if(newNom==null)
                    return;



                fetch(API+"/"+id,{

                    method:"PUT",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({

                        nom:newNom,

                        libelle:newLibelle

                    })

                })

                    .then(res=>res.json())

                    .then(()=>{

                        alert("Modification réussie");

                        loadCategories();

                    });


            }








            // DELETE

            function deleteCategorie(id){


                if(!confirm("Supprimer cette catégorie ?"))
                    return;



                fetch(API+"/"+id,{

                    method:"DELETE"

                })

                    .then(res=>res.text())

                    .then(()=>{

                        alert("Catégorie supprimée");

                        loadCategories();

                    });


            }


        </script>
