<body>
<div class="container-scroller">
    <!-- partial:../../partials/_navbar.html -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <!-- partial -->
    <div class="container-fluid page-body-wrapper">
        <!-- partial:../../partials/_sidebar.html -->
        <div th:replace="fragments/sidebar :: sidebar"></div>        <!-- partial -->
        <div class="main-panel">
            <div class="content-wrapper">
                <div class="page-header">

                </div>
                <div class="row">
                    <div class="col-12 grid-margin stretch-card">
                        <div class="card">
                                <div class="template-demo">
                                    <div class="card shadow mb-4">
                                        <div class="card-body">
                                           <h4>📋 Liste des Pannes</h4>
                                                <div id="pannes"></div>
                                            </div>
                                        </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div></div>
<script>
    function loadPannes(){
        fetch("http://localhost:8088/pannes/getAll")
            .then(res => res.json())
            .then(data => {

                let html = "";

                data.forEach(p => {

                    html += `
            <div class="card mb-3 shadow-sm">
                <div class="card-body">

                    <h5>${p.titre}</h5>
                    <p class="text-muted">${p.description || ""}</p>

                    <div id="solutions-${p.id}">
                        <small class="text-secondary">Chargement solutions...</small>
                    </div>

                </div>
            </div>
            `;
                });

                document.getElementById("pannes").innerHTML = html;
                data.forEach(p => loadSolutions(p.id));

            });
    }
    loadPannes();
    //LOAD SOLUTIONS PAR PANNE
    function loadSolutions(panneId){

        fetch(`http://localhost:8088/solution/panne/${panneId}`)
            .then(res => res.json())
            .then(solutions => {

                let html = "<ul class='list-group mt-2'>";

                if(solutions.length === 0){
                    html += "<li class='list-group-item text-muted'>Aucune solution</li>";
                }

                solutions.forEach(s => {
                    html += `
                <li class="list-group-item d-flex justify-content-between">
                    <span>🔧 ${s.description}</span>
                    <span class="badge bg-primary">#${s.ordre}</span>
                </li>
            `;
                });

                html += "</ul>";

                document.getElementById("solutions-" + panneId).innerHTML = html;
            });
    }

</script>
<script src="/assets/js/off-canvas.js"></script>
