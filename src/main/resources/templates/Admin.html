<script>

//LOAD PANNES
function loadPannes(){
    fetch("http://localhost:8088/pannes/getAll")
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.forEach(p => {

            html += `
            <div class="card mb-3 shadow-sm">
                <div class="card-body">

                    <h5>${p.titre}</h5>
                    <p class="text-muted">${p.description || ""}</p>

                    <div id="solutions-${p.id}">
                        <small class="text-secondary">Chargement solutions...</small>
                    </div>

                </div>
            </div>
            `;
        });

        document.getElementById("pannes").innerHTML = html;
        data.forEach(p => loadSolutions(p.id));

    });
}

// CREATE PANNE + SOLUTIONS
function createPanne(){

    let titre = document.getElementById("titre").value;
    let description = document.getElementById("description").value;

    let solutions = document.querySelectorAll(".solution");

    //créer panne
    fetch("http://localhost:8088/pannes/createpanne", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ titre, description })
    })
    .then(res => res.json())
    .then(p => {

        //ajouter solutions
        solutions.forEach((input, index) => {

            if(input.value.trim() !== ""){

                fetch(`http://localhost:8088/solution/ajout/${p.id}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        description: input.value,
                        ordre: index + 1
                    })
                });
            }
        });

        alert("✅ Panne + Solutions ajoutées");

        // reset form
        document.getElementById("titre").value = "";
        document.getElementById("description").value = "";
        solutions.forEach(i => i.value = "");

        loadPannes();
    });
}

// init
loadPannes();
//LOAD SOLUTIONS PAR PANNE
function loadSolutions(panneId){

    fetch(`http://localhost:8088/solution/panne/${panneId}`)
    .then(res => res.json())
    .then(solutions => {

        let html = "<ul class='list-group mt-2'>";

        if(solutions.length === 0){
            html += "<li class='list-group-item text-muted'>Aucune solution</li>";
        }

        solutions.forEach(s => {
            html += `
                <li class="list-group-item d-flex justify-content-between">
                    <span>🔧 ${s.description}</span>
                    <span class="badge bg-primary">#${s.ordre}</span>
                </li>
            `;
        });

        html += "</ul>";

        document.getElementById("solutions-" + panneId).innerHTML = html;
    });
}

</script>
