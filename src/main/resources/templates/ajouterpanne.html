<div class="container-scroller">

                        <div class="col-12 grid-margin stretch-card">

                                <div class="card-body">
                                    <h4 class="card-title">Ajouter une panne</h4>
                                    <p class="card-description">Affecter <code>4 solutions au max</code>pour chaque panne</p>
                                    <div class="template-demo">
    <div class="card shadow mb-4">
        <div class="card-body">

            <h4>Ajouter une panne</h4>

            <input id="titre" class="form-control mb-2" placeholder="Titre">
            <textarea id="description" class="form-control mb-2" placeholder="Description"></textarea>

            <h5 class="mt-3">Solutions (max 4)</h5>

            <input class="form-control mb-2 solution" placeholder="Solution 1">
            <input class="form-control mb-2 solution" placeholder="Solution 2">
            <input class="form-control mb-2 solution" placeholder="Solution 3">
            <input class="form-control mb-2 solution" placeholder="Solution 4">

            <button class="btn btn-success w-100 mt-3" onclick="createPanne()">
                💾 Enregistrer
            </button>

        </div>

                            </div>

                    </div>
                </div>
            </div>
        </div></div>


<script>

//LOAD PANNES
function loadPannes(){
    fetch("http://localhost:8088/pannes/getAll")
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.forEach(p => {

            html += `
            <div class="card mb-3 shadow-sm">
                <div class="card-body">

                    <h5>${p.titre}</h5>
                    <p class="text-muted">${p.description || ""}</p>

                    <div id="solutions-${p.id}">
                        <small class="text-secondary">Chargement solutions...</small>
                    </div>

                </div>
            </div>
            `;
        });

        document.getElementById("pannes").innerHTML = html;
        data.forEach(p => loadSolutions(p.id));

    });
}

// CREATE PANNE + SOLUTIONS
function createPanne(){

    let titre = document.getElementById("titre").value;
    let description = document.getElementById("description").value;

    let solutions = document.querySelectorAll(".solution");

    //créer panne
    fetch("http://localhost:8088/pannes/createpanne", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ titre, description })
    })
    .then(res => res.json())
    .then(p => {

        //ajouter solutions
        solutions.forEach((input, index) => {

            if(input.value.trim() !== ""){

                fetch(`http://localhost:8088/solution/ajout/${p.id}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        description: input.value,
                        ordre: index + 1
                    })
                });
            }
        });

        alert("✅ Panne + Solutions ajoutées");

        // reset form
        document.getElementById("titre").value = "";
        document.getElementById("description").value = "";
        solutions.forEach(i => i.value = "");

        loadPannes();
    });
}

// init
loadPannes();
//LOAD SOLUTIONS PAR PANNE
function loadSolutions(panneId){

    fetch(`http://localhost:8088/solution/panne/${panneId}`)
    .then(res => res.json())
    .then(solutions => {

        let html = "<ul class='list-group mt-2'>";

        if(solutions.length === 0){
            html += "<li class='list-group-item text-muted'>Aucune solution</li>";
        }

        solutions.forEach(s => {
            html += `
                <li class="list-group-item d-flex justify-content-between">
                    <span>🔧 ${s.description}</span>
                    <span class="badge bg-primary">#${s.ordre}</span>
                </li>
            `;
        });

        html += "</ul>";

        document.getElementById("solutions-" + panneId).innerHTML = html;
    });
}

</script>

</body>
