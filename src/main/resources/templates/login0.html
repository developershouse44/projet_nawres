<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .my-logo{
            margin-left: 50px;
            margin-right: 50px;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 col-md-4 mx-auto">

        <h3 class="text-center">Login</h3>
        <div class="text-center navbar-brand-wrapper d-flex align-items-center justify-content-start">
            <a class="navbar-brand brand-logo" href="/agenttechnique">
                <img class="my-logo" src="/assets/images/télécharger.png" alt="logo">
            </a>
        </div>
        <input id="login" class="form-control mt-3" placeholder="Login">

        <input id="password" type="password" class="form-control mt-2" placeholder="Password">

        <button class="btn btn-primary w-100 mt-3" onclick="login()">
            Login
        </button>

        <p id="msg" class="text-danger text-center mt-2"></p>

    </div>

</div>

<script>
    const API = "http://localhost:8088";

    function login() {

        const login = document.getElementById("login").value;
        const password = document.getElementById("password").value;

        fetch(API + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ login, password })
        })
            .then(res => res.json())
            .then(data => {

                if (data.status === "INVALID") {
                    msg.innerText = "Login incorrect";
                    return;
                }

                localStorage.setItem("user", JSON.stringify(data));

                if (data.role === "ADMIN") window.location.href = "/admin";
                else if (data.role === "AGENT") window.location.href = "/agent";
                else window.location.href = "/agenttechnique";
            });
    }
</script>

</body>
</html>
